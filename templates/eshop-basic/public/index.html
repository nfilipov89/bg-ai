<!DOCTYPE html><html lang="bg"><head><meta charset="UTF-8"><title>Магазин</title><style>body{font-family:system-ui;padding:2rem;background:#fafafa}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}.card{background:white;padding:1rem;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.08)}</style></head><body><h1>Магазин</h1><div id="products" class="grid"></div><script>fetch('/api/products').then(r=>r.json()).then(data=>{document.getElementById('products').innerHTML=data.map(p=>`<div class="card"><h3>${p.name}</h3><p>${p.price} лв</p><button>Купи</button></div>`).join('')})</script></body></html>
