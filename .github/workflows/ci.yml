name: Factory CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        template: [eshop-luxe, saas-glass, site-portfolio]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: templates/${{ matrix.template }}/package-lock.json

      - name: Install dependencies
        run: cd templates/${{ matrix.template }} && npm ci

      - name: Run tests
        run: cd templates/${{ matrix.template }} && npm test
